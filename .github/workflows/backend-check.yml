name: Check Comtrade backend

on:
  push:
    branches: [main]
    paths:
      - "comtrade-backend/**"
      - ".github/workflows/backend-check.yml"
  pull_request:
    paths:
      - "comtrade-backend/**"
      - ".github/workflows/backend-check.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: comtrade-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: comtrade-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate and test
        run: |
          npm run build
          npm test
